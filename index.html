<html lang="en">

<style>
  :root{ --ink:#3a2540; --pink:#ff4fa0; --blue:#2a9fe0; --purple:#8a5cf0; --yellow:#ffc41f; --ok:#28cf86;
    --soft:#8a7ba0; --line:#ece2f5; --accent:#8a5cf0; --card:#fff;
    --bub:"Baloo 2",sans-serif; --sh:3px 4px 0 rgba(58,37,64,.18); }
  :root{ --ease-spring:cubic-bezier(.34,1.56,.64,1); --ease-settle:cubic-bezier(.22,.9,.3,1); --dur-enter:.46s; --dur-micro:.14s; --stagger:40ms; } /* MOTION SYSTEM (v648/v649, David's "alive & friendly" pass): tune the whole app's feel from ONE place */
  @keyframes sfcReveal{ from{ clip-path:circle(0% at var(--rx,50%) var(--ry,42%)); opacity:.45; } to{ clip-path:circle(150% at var(--rx,50%) var(--ry,42%)); opacity:1; } } /* PORTAL reveal — a surface opens through a circle growing from a focal point (the now-line) + opacity fade so it reads on dark. clip-path = paint-only → never touches scroll/pinch math */
  .sfc-reveal{ animation:sfcReveal var(--dur-enter) var(--ease-settle); }
  @keyframes cascItem{ from{ opacity:0; transform:translateY(16px) scale(.93); } to{ opacity:1; transform:none; } } /* staggered cascade — menu/list items ARRIVE in sequence with a spring pop */
  .casc-item{ animation:cascItem var(--dur-enter) var(--ease-spring) both; }
  @keyframes cascBlk{ from{ opacity:0; transform:scale(.78); } to{ opacity:1; transform:none; } } /* timeline BLOCKS pop into place, radiating out from the now-line — the visible "your day arrives" moment */
  .casc-blk{ animation:cascBlk var(--dur-enter) var(--ease-spring) both; }
  @keyframes jpPop{ from{ opacity:0; transform:scale(.2); } to{ opacity:1; transform:none; } } /* journey STEPPING-STONES: each node bubble pops in, staggered (Duolingo path) */
  .jp-pop{ animation:jpPop .5s var(--ease-spring) both; }
  #journeyPath.jp-leaving{ animation:jpLeave .28s ease forwards; } /* crossfade the journey out to reveal the planner cleanly */
  @keyframes jpLeave{ from{ opacity:1; } to{ opacity:0; } }
  @media (prefers-reduced-motion: reduce) and (max-width: 1px){ .sfc-reveal, .casc-item, .casc-blk{ animation:none !important; } }
  /* UNIVERSAL menu entrance (v650): EVERY overlay card springs in + its backdrop fades — one rule animates the whole app's menus on appear, not feature-by-feature */
  @keyframes popIn{ from{ opacity:0; transform:translateY(22px) scale(.8); } to{ opacity:1; transform:none; } }
  @keyframes ovFade{ from{ opacity:0; } to{ opacity:1; } }
  .dur-card, .goal-card, .mind-card, .nb-card, .ob-card, .sheetcard{ animation:popIn var(--dur-enter) var(--ease-spring) both; }
  .dur-ov, .goal-ov, .mind-ov, .nb-ov, .cele-ov{ animation:ovFade var(--dur-micro) var(--ease-settle) both; }
  /* tap micro-spring on the things you press most — menu items + chips give instant springy feedback */
  .bchip, .tile, .pchip, .preset-row, .qopt, .subitem, .bigcat, .feat-row, .tool-row{ transition:transform var(--dur-micro) var(--ease-settle); }
  .bchip:active, .tile:active, .pchip:active, .preset-row:active, .qopt:active, .subitem:active, .feat-row:active, .tool-row:active{ transform:scale(.94); }
  @media (prefers-reduced-motion: reduce) and (max-width: 1px){ .dur-card, .goal-card, .mind-card, .nb-card, .ob-card, .sheetcard, .dur-ov, .goal-ov, .mind-ov, .nb-ov, .cele-ov{ animation:none !important; } }
  /* ===== START SCREEN (v652): the animated launch screen — living guardian (13-frame idle sprite) + title + language + Continue/New, Duolingo/Tuber-sim feel ===== */
  #startScreen{ position:fixed; inset:0; z-index:200; display:none; flex-direction:column; align-items:center; justify-content:space-between; background:linear-gradient(170deg,#3a0f24 0%,#24091c 46%,#1e0a16 78%,#241019 100%); padding:max(env(safe-area-inset-top,0px),26px) 22px calc(env(safe-area-inset-bottom,0px) + 30px); font-family:"Jost",sans-serif; overflow:hidden; }
  #startScreen.on{ display:flex; }
  #startScreen.leaving{ animation:ssLeave .42s var(--ease-settle) forwards; }
  .ss-ver{ position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 8px); left:0; right:0; text-align:center; font-family:"Jost",sans-serif; font-size:11px; letter-spacing:.5px; color:rgba(255,255,255,.28); pointer-events:none; }
  @keyframes ssLeave{ to{ opacity:0; transform:scale(1.08); } }
  .ss-lang{ align-self:flex-end; background:rgba(255,255,255,.06); border:2px solid #3a1730; border-radius:12px; padding:7px; cursor:pointer; display:flex; align-items:center; opacity:0; animation:ssFade var(--dur-enter) var(--ease-settle) .1s both; }
  .ss-lang:active{ transform:scale(.93); }
  .ss-flag{ width:30px; height:22px; border-radius:4px; overflow:hidden; display:block; box-shadow:0 0 0 1px rgba(0,0,0,.3); }
  .ss-flag svg{ display:block; width:100%; height:100%; }
  .ss-langmenu{ position:absolute; top:62px; right:18px; z-index:6; background:#2c081a; border:2px solid #160510; border-radius:16px; box-shadow:0 16px 44px rgba(0,0,0,.6); padding:6px; display:flex; flex-direction:column; gap:2px; min-width:178px; animation:popIn .26s var(--ease-spring) both; }
  .ss-langrow{ display:flex; align-items:center; gap:11px; background:none; border:none; color:#ffe3f1; font-family:"Jost",sans-serif; font-weight:700; font-size:15px; padding:10px 12px; border-radius:11px; cursor:pointer; text-align:left; }
  .ss-langrow.on{ background:rgba(255,95,160,.13); }
  .ss-langrow .ti-check{ margin-left:auto; color:#ff5fa0; }
  .ss-langrow:active{ transform:scale(.97); }
  .ss-hero{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
  .ss-stars{ position:absolute; inset:0; pointer-events:none; } /* §12 frame 11: 3 barely-alive stars in the sky */
  .ss-stars i{ position:absolute; width:3px; height:3px; border-radius:50%; background:#e8d8ea; animation:ssTwinkle 3.4s ease-in-out infinite; }
  .ss-stars i:nth-child(1){ top:14%; left:18%; }
  .ss-stars i:nth-child(2){ top:24%; right:20%; animation-delay:1.2s; }
  .ss-stars i:nth-child(3){ top:44%; left:10%; animation-delay:2.1s; width:2px; height:2px; }
  .ss-glint{ transform-box:fill-box; transform-origin:center; animation:ssHalo 4s ease-in-out infinite, ssGlint 6s linear infinite; } /* the light that ORBITS the ring every ~6s — jewelry, not a rectangle sweep (§11 verdict) */
  @keyframes ssGlint{ 0%{ stroke-dashoffset:0; opacity:0; } 6%{ opacity:.95; } 40%{ opacity:.95; } 52%{ stroke-dashoffset:-100; opacity:0; } 100%{ stroke-dashoffset:-100; opacity:0; } }
  .ss-guardian-wrap{ margin:2px 0 8px; animation:ssSpawn .74s var(--ease-spring) both, ssBob 3.2s ease-in-out 1.1s infinite; }
  .ss-guardian{ width:200px; height:200px; display:flex; align-items:center; justify-content:center; animation:ssGlow 2.6s ease-in-out infinite; } /* NO tile/outline — just the animated mark interior floating on the gradient (David v660) */
  .ss-mark{ width:100%; height:100%; overflow:visible; }
  .ss-halo{ transform-box:fill-box; transform-origin:center; animation:ssHalo 4s ease-in-out infinite; }
  .ss-spark{ transform-box:fill-box; transform-origin:center; animation:ssSparkLive 2.6s ease-in-out infinite; }
  .ss-spk2{ transform-box:fill-box; transform-origin:center; animation:ssTwinkle 2s ease-in-out infinite; }
  .ss-spk3{ transform-box:fill-box; transform-origin:center; animation:ssTwinkle 2.2s ease-in-out 1s infinite; }
  @keyframes ssHalo{ 0%,100%{ transform:rotate(-15deg) scaleX(1); } 50%{ transform:rotate(-6deg) scaleX(1.05); } }
  @keyframes ssSparkLive{ 0%{ transform:rotate(0deg) scale(.95); } 50%{ transform:rotate(10deg) scale(1.13); } 100%{ transform:rotate(0deg) scale(.95); } }
  @keyframes ssTwinkle{ 0%,100%{ opacity:.4; transform:scale(.6); } 50%{ opacity:1; transform:scale(1.2); } }
  @keyframes ssBob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-13px); } }
  @keyframes ssSpawn{ from{ opacity:0; transform:scale(.25) rotate(-25deg); } to{ opacity:1; transform:none; } }
  @keyframes ssGlow{ 0%,100%{ filter:drop-shadow(0 6px 16px rgba(255,95,160,.22)); } 50%{ filter:drop-shadow(0 6px 32px rgba(255,95,160,.55)); } }
  .ss-title{ font-family:"Jost",sans-serif; font-weight:700; font-size:42px; letter-spacing:11px; padding-left:11px; color:#fff; text-shadow:0 0 26px rgba(255,95,160,.25); opacity:0; animation:ssPop var(--dur-enter) var(--ease-spring) .3s both; } /* §12 frame 11: clean wide-tracked wordmark — the cartoon ink-shadow leaves */
  .ss-tag{ color:#c79ab4; font-size:14px; font-weight:600; margin-top:2px; opacity:0; animation:ssFade var(--dur-enter) var(--ease-settle) .45s both; }
  @keyframes ssPop{ from{ opacity:0; transform:scale(.7); } to{ opacity:1; transform:none; } }
  @keyframes ssFade{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
  .ss-actions{ width:100%; display:flex; flex-direction:column; gap:11px; align-items:center; }
  .ss-btn{ font-family:"Jost",sans-serif; font-weight:800; cursor:pointer; border:3px solid #160510; border-radius:16px; box-shadow:0 5px 0 #160510; display:flex; align-items:center; justify-content:center; gap:9px; opacity:0; } /* app-theme: flat fill, ink border, hard offset shadow (David v660) */
  .ss-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #160510 !important; }
  .ss-primary{ width:100%; max-width:430px; padding:20px; font-size:20px; border-radius:22px; background:#ff5fa0; color:#4a1126; animation:ssRise var(--dur-enter) var(--ease-spring) .5s both; } /* BIG primary, brand pink — frame 11's soft-rounded slab */
  .ss-subrow{ width:100%; max-width:430px; display:flex; gap:10px; justify-content:center; }
  .ss-sub{ flex:none; padding:8px 14px; font-size:15px; font-weight:700; background:none; border:none; box-shadow:none; animation:ssRise var(--dur-enter) var(--ease-spring) .62s both; } /* frame 11: secondaries are BARE words under the one pink button — no boxes */
  .ss-sub:active{ transform:translateY(1px); box-shadow:none !important; opacity:.7; }
  .ss-load{ color:#b3a0c4; }
  .ss-new{ color:#c4a0b4; }
  /* ===== intro verdict #17 ===== */
  .ss-tag.ss-ember{ display:inline-flex; align-items:center; gap:7px; color:#e9b9cf; font-size:15px; font-weight:700; letter-spacing:.2px; }
  .ss-tag.ss-ember .ti-flame{ color:#ff8a3d; font-size:17px; filter:drop-shadow(0 0 6px rgba(255,138,61,.55)); animation:ssFlick 2.6s ease-in-out infinite; }
  @keyframes ssFlick{ 0%,100%{ transform:translateY(0) rotate(-1deg); opacity:1; } 50%{ transform:translateY(-1px) rotate(1.5deg); opacity:.82; } }
  .ss-tag.ss-ember b{ font-weight:800; color:#ffe3f1; }
  .ss-primary.ss-go{ background:#28cf86; color:#0a3a24; }
  .ss-primary.ss-go .ti-player-play-filled{ font-size:20px; }
  .ss-card{ width:100%; max-width:430px; background:#2c081a; border:3px solid #160510; border-radius:22px; box-shadow:0 6px 0 #160510; padding:18px 18px 16px; margin:0 auto; animation:ssRise .5s cubic-bezier(.2,.9,.3,1.02) both; }
  @keyframes ssRise{ from{ transform:translateY(14px) scale(.96); opacity:0; } to{ transform:none; opacity:1; } }
  .ss-card-cap{ font-family:"Jost",sans-serif; font-weight:800; font-size:12.5px; letter-spacing:1.4px; text-transform:uppercase; color:#c78ab0; margin-bottom:12px; }
  .ss-card-cap.warn{ color:#e79a84; }
  .ss-profrow{ display:flex; align-items:center; gap:13px; margin-bottom:14px; }
  .ss-profrow .ti{ font-size:26px; color:#ff4fa0; flex:none; }
  .ss-profname{ font-family:"Jost",sans-serif; font-weight:800; font-size:21px; color:#ffe3f1; line-height:1.1; }
  .ss-profmeta{ font-family:"Jost",sans-serif; font-weight:600; font-size:13.5px; color:#b58aa6; margin-top:2px; }
  .ss-restore{ width:100%; font-family:"Jost",sans-serif; font-weight:800; font-size:18px; cursor:pointer; border:3px solid #160510; border-radius:16px; box-shadow:0 5px 0 #160510; background:#ff4fa0; color:#4a1126; padding:16px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .ss-restore:active{ transform:translateY(3px); box-shadow:0 1px 0 #160510 !important; }
  .ss-cancel{ display:block; width:100%; text-align:center; margin-top:11px; background:none; border:none; font-family:"Jost",sans-serif; font-weight:700; font-size:14px; letter-spacing:.4px; color:#9a7f92; cursor:pointer; }
  .ss-cancel:active{ opacity:.6; }
  .ss-eraserow{ display:flex; align-items:flex-start; gap:11px; margin-bottom:9px; }
  .ss-eraserow .ti-alert-triangle{ font-size:22px; color:#e79a84; flex:none; margin-top:2px; }
  .ss-erasettl{ font-family:"Jost",sans-serif; font-weight:800; font-size:18px; color:#ffe3f1; line-height:1.15; }
  .ss-erasescope{ font-family:"Jost",sans-serif; font-weight:600; font-size:13.5px; color:#b58aa6; margin:0 0 14px 33px; }
  .ss-drain{ height:6px; border-radius:6px; background:rgba(255,79,160,.16); overflow:hidden; }
  .ss-drain > i{ display:block; height:100%; width:100%; border-radius:6px; background:linear-gradient(90deg,#ff4fa0,#ff8ac0); transform-origin:left center; animation:ssDrain 4s linear forwards; }
  @keyframes ssDrain{ from{ transform:scaleX(1); } to{ transform:scaleX(0); } }
  @keyframes ssRise{ from{ opacity:0; transform:translateY(18px) scale(.96); } to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce) and (max-width: 1px){ .ss-lang,.ss-sparkles,.ss-guardian-wrap,.ss-guardian,.ss-halo,.ss-spark,.ss-spk2,.ss-spk3,.ss-title,.ss-tag,.ss-btn{ animation:none !important; opacity:1 !important; } }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;color:var(--ink);font-family:"Fredoka",system-ui,sans-serif;font-weight:500;
    background:linear-gradient(170deg,#92e2ff 0%,#c7b2ff 50%,#ffc0e2 100%);}
  #screen{max-width:520px;margin:0 auto;min-height:100%;padding:16px 14px max(40px,env(safe-area-inset-bottom));}
  header{padding:6px 4px 12px;position:relative;}
  #gear{position:absolute;top:4px;right:2px;background:rgba(255,255,255,.08);border:2px solid #4a4068;color:#f3edfc;width:40px;height:40px;border-radius:13px;font-size:19px;cursor:pointer;z-index:5;}
  #gameBtn{position:absolute;top:4px;right:48px;background:rgba(255,255,255,.08);border:2px solid #4a4068;color:#f3edfc;width:40px;height:40px;border-radius:13px;font-size:19px;cursor:pointer;z-index:5;}
  #date{font-family:var(--bub);font-size:13px;color:#5a3f6e;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
  #hello{font-family:var(--bub);font-size:26px;font-weight:800;margin-top:2px;text-shadow:0 2px 0 rgba(255,255,255,.5);}
  /* hero */
  #hero{border:3px solid var(--ink);border-radius:26px;padding:18px;color:#fff;margin-bottom:14px;
    background:linear-gradient(135deg,#a06bff,#ff5fa0);box-shadow:5px 6px 0 var(--ink);}
  #hero .ht{font-family:var(--bub);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.95;}
  #hero .hl{font-family:var(--bub);font-size:22px;font-weight:800;margin:5px 0 4px;line-height:1.2;text-shadow:0 2px 0 rgba(0,0,0,.12);}
  #hero .hs{font-size:14.5px;font-weight:500;opacity:.96;line-height:1.4;margin-bottom:15px;}
  #hero .hp{width:100%;background:#fff;color:#7a3fe0;border:3px solid var(--ink);border-radius:18px;padding:14px;
    font-family:var(--bub);font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--ink);transition:.08s;}
  #hero .hp:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  #hero .chips{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}
  #hero .chip{background:#ffffff;color:var(--ink);border:2.5px solid var(--ink);border-radius:14px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 var(--ink);transition:.08s;}
  #hero .chip:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}
  /* panels — candy, outlined, sticker shadow */
  .panel{border:3px solid var(--ink);border-radius:24px;padding:15px 15px 12px;margin-bottom:14px;box-shadow:var(--sh);}
  #nowCard{background:#ffe79a;}
  .c-today{background:#bfe6ff;} .c-habit{background:#ffd0e6;} .c-tom{background:#ddd0ff;}
  #nowCard .nl{font-family:var(--bub);font-size:16px;font-weight:800;margin-bottom:2px;}
  #nowCard .ns{font-size:13px;color:#7a5a2a;font-weight:500;margin-bottom:11px;}
  #nowBtn{width:100%;background:#fff;color:#c47a00;border:3px solid var(--ink);border-radius:16px;padding:13px;font-family:var(--bub);font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--ink);transition:.08s;}
  #nowBtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  .cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .cardhead h3{font-family:var(--bub);font-size:18px;font-weight:800;}
  .meta{font-family:var(--bub);font-size:13px;color:var(--ink);font-weight:700;background:rgba(255,255,255,.6);padding:3px 10px;border-radius:11px;border:2px solid var(--ink);}
  .add{background:#fff;color:var(--ink);border:2.5px solid var(--ink);border-radius:13px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--bub);box-shadow:0 3px 0 var(--ink);transition:.08s;}
  .add:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}
  .empty{color:#6a567e;font-size:14px;padding:9px 2px;font-weight:600;}
  .blk{display:flex;align-items:center;gap:10px;padding:10px 6px;background:rgba(255,255,255,.55);border:2.5px solid var(--ink);border-radius:15px;margin-bottom:8px;}
  .blk .tm{font-family:var(--bub);font-size:12px;font-weight:800;color:var(--ink);width:96px;flex:none;}
  .blk .ti{flex:1;font-size:15px;font-weight:600;}
  .blk.done .ti{opacity:.55;text-decoration:line-through;}
  .ck{width:28px;height:28px;border-radius:9px;border:2.5px solid var(--ink);background:#fff;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;}
  .ck.on{background:var(--ok);}
  .del{color:var(--ink);opacity:.5;font-size:15px;cursor:pointer;padding:4px;font-weight:700;}
  .divlab{font-family:var(--bub);font-size:12px;color:var(--ink);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:14px 2px 8px;display:flex;justify-content:space-between;}
  .logi{display:flex;align-items:center;gap:10px;padding:9px 6px;background:rgba(255,255,255,.45);border:2.5px solid var(--ink);border-radius:14px;margin-bottom:7px;}
  .logi .lt{font-family:var(--bub);font-size:12px;color:var(--ink);font-weight:700;width:62px;flex:none;}
  .logi .ln{flex:1;font-size:14.5px;font-weight:600;}
  .logi .lm{font-family:var(--bub);font-size:13px;font-weight:800;color:#fff;background:var(--pink);padding:3px 10px;border-radius:11px;border:2px solid var(--ink);}
  .hab{display:flex;align-items:center;gap:11px;padding:9px 6px;background:rgba(255,255,255,.55);border:2.5px solid var(--ink);border-radius:15px;margin-bottom:8px;cursor:pointer;}
  .hab .he{font-size:23px;width:30px;text-align:center;flex:none;}
  .hab .hn{flex:1;font-size:15px;font-weight:700;}
  .hab.done .hn{opacity:.5;}
  .add2{width:100%;background:#fff;border:3px solid var(--ink);color:var(--ink);border-radius:15px;padding:11px;font-family:var(--bub);font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 0 var(--ink);transition:.08s;}
  .add2:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  /* sheet (menu) */
  #sheet{position:fixed;inset:0;background:rgba(40,20,60,.45);display:flex;align-items:flex-end;z-index:95;opacity:0;pointer-events:none;transition:.22s;}/* z-95 > cockpit stage (#trackerFull z-90): a modal sheet opened from the toolbox (Grateful Flow, Settings…) must sit ABOVE the cockpit or it's unclickable (David 2026-07-01) */
  #sheet.on{opacity:1;pointer-events:auto;}

  /* NODE + tile — FLAT domain color, ink border, Tabler symbol (no gloss/glow); current = striped hero tile */

  /* ============ v373 — JOST type + TABLER icons + CALENDAR 1:1 from mockups (030/031/032/034) ============ */

  .calhrl{ position:absolute; left:0; width:23px; text-align:right; font-weight:800; font-size:14px; color:#dba9c2; } /* heavier, slightly larger + brighter hour numbers (David 2026-06-27) */

  /* while zooming (slider drag OR pinch) the timeline is repositioned by JS every frame — kill the top/height transition so bubbles SNAP and never bounce (David 2026-06-25) */
  #pullBody.zooming .calblk, #pullBody.zooming .nowline, #pullBody.zooming .nowcirc, #pullBody.zooming .nowread, #pullBody.zooming .calhour, #pullBody.zooming .calhalf, #pullBody.zooming .calhrl, #pullBody.zooming .calsub, #pullBody.zooming .timemark{ transition:none !important; }

  .calblk .cn{ font-weight:800; font-size:14.5px; letter-spacing:.1px; line-height:1.15; position:relative; z-index:2; } /* bolder/larger bubble titles, readable on the deep stripes (David 2026-06-27) */

  .calblk .foil{ position:absolute; top:-25%; bottom:-25%; left:0; width:45%; pointer-events:none; z-index:1; background:linear-gradient(90deg,transparent,rgba(255,252,240,.5),transparent); transform:skewX(-14deg) translateX(-180%); animation:foilSweep 3.2s linear infinite; } /* GPU shimmer: a skewed light streak swept by transform:translateX — composites on the GPU, so it stays smooth during scroll AND pinch-scale (no background-position repaint, no mix-blend). David 2026-06-26 */

  @keyframes burnOut{ 0%{ opacity:1; filter:brightness(1.5) saturate(1.3); box-shadow:0 0 22px 3px #ff8a3a,0 0 0 1px #160510; } 45%{ opacity:.85; filter:brightness(1) saturate(.9); } 100%{ opacity:.62; filter:saturate(.5) brightness(.78); box-shadow:none; } }
  .calblk.act.onplan{ box-shadow:0 0 0 3px rgba(255,95,168,.5) inset, 0 3px 0 #160510, 0 5px 14px rgba(0,0,0,.4) !important; } /* matched = pink berry rim, never white (David 2026-06-27) */
  .calblk.live{ animation:livePulse 1.7s ease-in-out infinite; }
  @keyframes celePop{ 0%{transform:scale(.6);} 60%{transform:scale(1.05);} 100%{transform:scale(1);} }
  @keyframes foilSlide{ 0%{background-position:-40% 0;} 100%{background-position:140% 0;} }
  @keyframes livePulse{ 0%,100%{box-shadow:0 3px 0 #160510,0 0 0 3px #ff7a1a,0 0 14px #ff5a1a;} 50%{box-shadow:0 3px 0 #160510,0 0 0 4px #ff5a1a,0 0 30px #ff7a1a;} } /* B1: the present BURNS — fire-orange glow ring pulse (David 2026-06-25) */
  .calx{ position:absolute; top:3px; right:4px; width:20px; height:20px; border-radius:7px; background:rgba(10,4,12,.42); color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:5; }
  .calblk.live{ z-index:3; } /* the live/current activity sits above neighbours, never squished */
  .calblk.live.newborn{ animation:none; box-shadow:none !important; border-color:transparent; } /* first ~minute of tracking: no burning ring around a nearly-empty bubble — the ring arrives once the bar has a body (David device 2026-07-04: the empty orange ring floating at the line read as broken) */

  .live-elapsed.commit-ready{ color:#ffd54a; text-shadow:0 0 6px rgba(255,213,74,.65); } /* Day 4 (David 2026-07-02): timer commitment self-completes — glows gold once elapsed reaches the committed time, so she never has to remember to stop */

  .nowline{ position:absolute; left:26px; right:4px; height:0; border-top:5px solid #ff5fa0; z-index:6; } /* a touch thicker — the brightest thing on the timeline (David 2026-06-27) */

  /* PER-SECOND LIVE CHARGE glide: the now-anchored elements creep/grow/shrink smoothly between the per-minute rebuilds (tickCharge nudges top/height each second; the ~1s linear transition fills the gap → the battery reads as MOVING, not snapping). Suppressed while zooming so a pinch can't animate → no bounce. */

  .calblk.lbl-i .cn-t, .calblk.lbl-i .csub, .calblk.lbl-i .step-n, .calblk.lbl-i .ti-sparkles, .calblk.lbl-i .calx, .calblk.lbl-i .grip, .calblk.lbl-i .gript{ display:none !important; }
  /* SIDE (<9px): too thin for a label → its icon goes to the right rail. STYLE STAYS CONSISTENT with a normal bubble — same 2px ink border, same rounded corners, same inline 0 3px 0 drop-shadow — just smaller. (Was: border stripped to 0, radius 3px, a flat shadow → looked like a bare line, inconsistent with the bordered/shadowed bubbles above it — David 2026-06-27.) box-shadow/border-width are NOT overridden so the per-bubble inline shadow (the "0 3px 0 #160510" the render sets) shows through. overflow:visible lets the side .clr label sit outside. */
  .calblk.lbl-s{ padding:0 !important; border-radius:8px !important; overflow:visible !important; filter:none !important; opacity:1 !important; z-index:4; }
  .calblk.lbl-s .cn{ display:flex !important; align-items:center; justify-content:center; height:100%; padding:0 !important; margin:0; line-height:1; pointer-events:none; } /* too thin for text → show JUST the icon, centred ON the bubble (David 2026-06-28 side-icon restore) */
  .calblk.lbl-s .cn .ti{ font-size:11px; }
  .calblk.lbl-s .cn-t{ display:none !important; } /* still no room for the name on the bar itself */
  .calblk.lbl-s.clr .cn{ position:static; transform:none; } /* the old left-side label is retired — the side-icon now lives ON the bubble */
  .calblk.lbl-s .csub, .calblk.lbl-s .calx, .calblk.lbl-s .grip, .calblk.lbl-s .gript, .calblk.lbl-s .foil, .calblk.lbl-s .shine, .calblk.lbl-s .ti-sparkles, .calblk.lbl-s .step-n{ display:none !important; }
  /* BIGGER TAP TARGET (David 2026-06-28): a small bubble is hard to hit, so an INVISIBLE ::after pad extends its clickable area ~9px above and below WITHOUT changing the visual size or covering neighbours' visuals (it's transparent + sits behind the icon, z-index:0). Pseudo-element clicks count as the card, so the existing pointerdown handler fires. */
  .calblk.lbl-i::after, .calblk.lbl-s::after{ content:""; position:absolute; left:-3px; right:-3px; top:-9px; bottom:-9px; z-index:0; background:transparent; }
  /* C9a (David 2026-07-02): a YOUNG live bar must end EXACTLY at the now-line. Even with padding:0, border-box still renders the 2+2px borders past a ~0 height, the centred icon overflows (overflow:visible), and the inline "0 3px 0" drop-shadow prints below the line. Thin LIVE bars drop all three; the pink now-line stays the only edge. */
  .calblk.live.lbl-i, .calblk.live.lbl-s{ border-top-width:0 !important; border-bottom-width:0 !important; box-shadow:none !important; }
  .calblk.live.lbl-s .cn{ display:none !important; } /* too thin even for the icon — the now-line readout carries the label until the bar has room */
  .calblk.lbl-i .cn-el, .calblk.lbl-s .cn-el{ display:none !important; } /* C9b: the elapsed timer appears only once the bar is tall enough for text (lbl-c and up) — no overlapping illegible lines in a sliver */
  /* SWIPE-SELECT FOCUS (David 2026-06-28): while dragging a finger across a cluster of small bubbles, the one under the finger grows slightly and its icon enlarges so you know which you're on. Calm — no neon/glow; the now-line stays the brightest thing. */
  .calblk.swfocus{ z-index:20 !important; transform:scale(1.5) !important; transform-origin:right center; box-shadow:0 4px 0 #160510, 0 8px 18px rgba(0,0,0,.5) !important; transition:transform .1s cubic-bezier(.2,.85,.3,1.3); }
  .calblk.swfocus .cn .ti{ font-size:16px !important; }
  /* FULL but <42px → drop the second (subtitle) line so it never clips */
  .calblk.nosub .csub{ display:none !important; }
  /* the matched-segment label on a partial (icon + name + ✓) */
  .matchseg .mscn{ position:relative; z-index:2; display:flex; align-items:center; gap:5px; width:100%; font-weight:700; font-size:12px; line-height:1; white-space:nowrap; overflow:hidden; }
  .matchseg .mscn .ti{ font-size:13px; }

  /* resize-gating — a thin bubble shows NO edge grips (tap = move/menu, never accidental resize) — David 2026-06-25 */
  .calblk[data-gate="move"] .grip, .calblk[data-gate="move"] .gript, .calblk[data-gate="menu"] .grip, .calblk[data-gate="menu"] .gript{ display:none !important; }
  .calblk[data-gate="menu"]{ cursor:pointer; }
  /* +/− steppers in the block-edit menu — set/extend a sliver you can't grab by its edges (David 2026-06-25) */
  .stepper{ display:flex; align-items:center; gap:12px; margin:3px 0 11px; }
  .stepper .stp{ width:42px; height:42px; border-radius:13px; background:#fff; border:2.5px solid #160510; font-size:23px; font-weight:800; color:#160510; box-shadow:0 3px 0 #160510; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:var(--bub); -webkit-tap-highlight-color:transparent; }
  .stepper .stp:active{ transform:translateY(2px); box-shadow:0 1px 0 #160510; }
  .stepper .stpv{ min-width:78px; text-align:center; font-family:var(--bub); font-weight:800; font-size:17px; color:#160510; }
  /* edit-fundamentals list (David 2026-06-25) */
  .fund-list{ display:flex; flex-direction:column; gap:6px; margin:2px 0; }
  .fund-row{ display:flex; align-items:center; gap:9px; background:#fff; border:2px solid #160510; border-radius:12px; padding:9px 11px; box-shadow:0 2px 0 #160510; }
  .fund-sw{ width:14px; height:14px; border-radius:50%; border:2px solid #160510; flex:none; }
  .fund-n{ flex:1; font-family:var(--bub); font-weight:700; font-size:14px; color:#160510; }
  .fund-x{ width:28px; height:28px; border-radius:9px; background:#ffe0ea; border:2px solid #160510; color:#160510; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:none; }
  /* kill the yellow predicted/selected rings — picked = a bold dark ring + ✓ (on-theme, never yellow) */
  .bchip.pred{ box-shadow:none !important; }
  .bchip.sel{ box-shadow:0 0 0 3px #160510 !important; transform:scale(1.04); }
  /* PINNED row = your most-important activities, as bigger square tiles, grouped by colour */
  .bento-pinned{ display:flex; flex-wrap:wrap; align-items:flex-start; gap:8px; padding:2px 0 13px; }
  .bento-pinned .bento-qlbl{ flex-basis:100%; margin:0 0 2px; }
  .bento-pinhint{ display:flex; align-items:center; gap:6px; color:#9a6a86; font-size:11.5px; font-weight:600; padding:1px 2px 13px; }
  .bchip.fav{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; width:82px; min-height:72px; padding:9px 6px; border-radius:15px; border-width:2.5px; box-shadow:0 3px 0 #160510; font-size:11.5px; text-align:center; line-height:1.15; white-space:normal; }
  .bchip.fav .ti{ font-size:22px; }
  .bchip.fav .ti-check{ font-size:13px; }
  /* ============ v444 — drag-to-scroll + hold-to-move on touch (JS-controlled) + easy bottom-edge resize (David 2026-06-24) ============ */
  /* movable bubbles are fully JS-controlled (touch-action:none) so a drag can SCROLL the timeline (1:1) and a hold can MOVE — no native-scroll fight that broke move on iOS */
  .calblk.lane{ touch-action:pan-y !important; } /* native momentum scroll when your thumb is on a bubble (buttery); a STILL long-press switches into JS drag, which blocks scroll itself — David 2026-06-27 */
  .calblk.act:not(.live){ touch-action:pan-y !important; }
  .calblk.live{ touch-action:pan-y !important; } /* the live timer doesn't move → keep native momentum scroll + tap-to-switch */
  /* the bottom edge is a full-width resize handle (easy to grab); top stays a small corner */
  .calblk .grip{ left:0 !important; right:0 !important; width:auto !important; height:14px !important; bottom:0 !important; top:auto !important; }
  .calblk.csmall .grip{ height:8px !important; }
  /* ============ v445 — render as a centered MOBILE column on desktop (mobile-first now; desktop app later) — David 2026-06-24 ============ */
  @media (min-width:560px){
    body{ background:#0c0510 !important; }
    #nav{ left:50% !important; right:auto !important; width:min(520px,100vw) !important; transform:translateX(-50%); box-shadow:0 -6px 26px rgba(0,0,0,.6) !important; }
    body.tab-day:not(.gaming) #pullSheet{ left:50% !important; right:auto !important; width:min(508px,calc(100vw - 16px)) !important; transform:translateX(-50%) !important; }
    #gameMode.on{ left:50% !important; right:auto !important; width:min(520px,100vw) !important; transform:translateX(-50%); box-shadow:0 0 0 100vmax rgba(8,4,14,.55); }
    #screen{ box-shadow:0 0 60px rgba(0,0,0,.4); }
  }
  /* ============ v446 — PAGED day view: one day per card, horizontal swipe pages between days (Apple-Photos slide) — David 2026-06-24 ============ */
  #pullBody.paged{ overflow:hidden !important; touch-action:none; padding:0 !important; }
  .day-pager{ display:flex; width:300%; height:100%; will-change:transform; }
  .day-card{ flex:0 0 33.3333%; min-width:0; height:100%; display:flex; flex-direction:column; padding:0; } /* full-bleed: sky reaches the screen edges, no maroon #pullSheet rim around the timeline (David 2026-06-27) */
  .day-cardhead{ flex:none; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:5px 2px 3px; }
  .day-cardlab{ color:#ffe3f1; font-family:"Jost",sans-serif; font-weight:800; font-size:16px; }
  .day-card.today .day-cardlab{ color:#ff5fa0; }
  .day-card .lanehead{ position:static !important; box-shadow:none !important; padding:3px 0 3px 34px !important; }
  .day-cardscroll{ flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; touch-action:pan-y; -webkit-overflow-scrolling:touch; position:relative; scrollbar-width:none; overscroll-behavior:contain; } /* day-boundary scroll-snap REMOVED — it was yanking the scroll to the nearest day header on pinch-release = the "bounce". Glassy free scroll now; if the day-crossing "wall" is wanted back we'll rebuild it without the snap-on-release bounce (David 2026-06-26) */
  .day-cardscroll > .day-stacksep{ /* scroll-snap-align removed with the snap-type above */ }
  #pullBody.zooming .day-cardscroll{ scroll-snap-type:none !important; } /* WHILE pinching, kill the day-boundary snap — else a programmatic anchor that lands near a day header gets yanked to it = the "zoom snaps to today's top" first-frame bug, worst when zoomed out (day detents are close) and self-correcting as you zoom in (detents spread apart). Snap returns the moment the pinch ends. (David 2026-06-26) */
  .hill-hint{ position:absolute; left:50%; transform:translateX(-50%); z-index:12; background:#3a1228; border:1.5px solid #6a3050; color:#ffb3d6; font-family:"Jost",sans-serif; font-weight:800; font-size:12px; padding:7px 14px; border-radius:999px; display:flex; align-items:center; gap:6px; pointer-events:none; box-shadow:0 4px 14px rgba(0,0,0,.5); white-space:nowrap; }
  .day-cardscroll::-webkit-scrollbar{ width:0; }
  /* ============ v447 — bento 2-column + stripes + shimmer · ghost=image4 · streak tiers (David 2026-06-24) ============ */
  /* BENTO: single-column full-width list of category panels (FIX #3b: was 2-col tiny boxes — DEVICE-UNTESTED) */
  .bento-gridwrap{ display:flex; flex-direction:column; gap:9px; }
  .bento-cat{ border:2px solid #160510 !important; border-radius:14px; padding:9px 9px 10px; position:relative; overflow:hidden; }
  .bento-cat::before{ content:""; position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 8px, transparent 8px 17px); } /* subtle diagonal stripes — more appealing */
  .bento-catl{ position:relative; z-index:1; font-size:11px; font-weight:800; letter-spacing:.6px; margin-bottom:8px; cursor:pointer; }
  .bento-chips{ display:flex !important; flex-wrap:wrap !important; gap:5px !important; position:relative; z-index:1; overflow:visible !important; grid-auto-flow:unset !important; grid-template-rows:unset !important; grid-auto-columns:unset !important; }
  /* shimmer/foil sheen on activity chips (David: add the shimmering effect to the habits) */
  .bchip{ position:relative; overflow:hidden; }
  .bchip::after{ content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.4) 50%,transparent 60%); background-size:240% 100%; animation:foilSlide 4.2s linear infinite; mix-blend-mode:overlay; }
  .bchip.addc::after, .bchip.more::after, .bchip.addt::after, .bchip.addc, .bchip.more{ }
  .bchip.addc::after, .bchip.more::after, .bchip.addt::after{ display:none; }
  .bchip.more{ font-weight:800; }
  /* GHOST / MISSED plan bubble = domain-tinted-dark hollow + clear domain outline + domain title (David's image 4) — no heavy fade */
  .calblk.ghost{ opacity:1 !important; filter:none !important; }
  .calblk.ghost .cn{ opacity:1 !important; }
  /* STREAK tiers: epic+ shimmer their gradient (David's image 2) */
  .streakfill.epic, .streakfill.superepic, .streakfill.legendary{ background-size:200% 100% !important; animation:streakFlow 2.6s linear infinite; }
  .streakfill.legendary{ animation-duration:1.8s; }
  @keyframes streakFlow{ 0%{ background-position:0% 0; } 100%{ background-position:200% 0; } }
  /* ============ v448 — NOW = the live card's bottom edge · time lives in the left gutter (David 2026-06-24) ============ */
  .nowtime{ position:absolute; left:0; color:#ff7fb6; font-family:"Jost",sans-serif; font-weight:800; font-size:11px; z-index:7; background:#2c081a; padding:1px 4px; border-radius:5px; white-space:nowrap; line-height:1.4; } /* clearer NOW readout — brighter pink, a touch larger (David 2026-06-27) */
  /* ============ ROOMS v1 (SPEC-FIRST-RUN §6, P4): each room = a bg treatment + a 2s threshold crossing + the 3-note entry signature. Rays retire to seals only. ============ */
  @keyframes roomIn{ from{ opacity:0; } to{ opacity:1; } }                      /* the threshold crossing — every ceremony fades through dark */
  @keyframes wellRipple{ 0%{ transform:translate(-50%,-50%) scale(.25); opacity:.5; } 100%{ transform:translate(-50%,-50%) scale(1.9); opacity:0; } }
  .well-rip{ position:absolute; left:50%; top:38%; width:220px; height:110px; border:1.5px solid rgba(120,170,220,.35); border-radius:50%; animation:wellRipple 7s ease-out infinite; pointer-events:none; }
  @keyframes emberCalm{ 0%{ transform:scale(1); filter:brightness(1.25); } 100%{ transform:scale(.38); filter:brightness(.85); } } /* the alarm in your chest, shrinking to a calm point on the exhale */

  .hearth-glow{ position:absolute; left:50%; bottom:14%; width:340px; height:230px; transform:translateX(-50%); background:radial-gradient(50% 60% at 50% 100%, rgba(255,138,58,.34), rgba(255,95,40,.12) 55%, transparent 75%); animation:hearthFlick 2.8s ease-in-out infinite; pointer-events:none; }
