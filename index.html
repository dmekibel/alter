<style>
  :root{ --ink:#3a2540; --pink:#ff4fa0; --blue:#2a9fe0; --purple:#8a5cf0; --yellow:#ffc41f; --ok:#28cf86;
    --soft:#8a7ba0; --line:#ece2f5; --accent:#8a5cf0; --card:#fff;
    --bub:"Baloo 2",sans-serif; --sh:3px 4px 0 rgba(58,37,64,.18); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;color:var(--ink);font-family:"Fredoka",system-ui,sans-serif;font-weight:500;
    background:linear-gradient(170deg,#92e2ff 0%,#c7b2ff 50%,#ffc0e2 100%);}
  #screen{max-width:520px;margin:0 auto;min-height:100%;padding:16px 14px max(40px,env(safe-area-inset-bottom));}
  header{padding:6px 4px 12px;position:relative;}
  #gear{position:absolute;top:4px;right:2px;background:rgba(255,255,255,.08);border:2px solid #4a4068;color:#f3edfc;width:40px;height:40px;border-radius:13px;font-size:19px;cursor:pointer;z-index:5;}
  #gameBtn{position:absolute;top:4px;right:48px;background:rgba(255,255,255,.08);border:2px solid #4a4068;color:#f3edfc;width:40px;height:40px;border-radius:13px;font-size:19px;cursor:pointer;z-index:5;}
  #date{font-family:var(--bub);font-size:13px;color:#5a3f6e;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
  #hello{font-family:var(--bub);font-size:26px;font-weight:800;margin-top:2px;text-shadow:0 2px 0 rgba(255,255,255,.5);}
  /* hero */
  #hero{border:3px solid var(--ink);border-radius:26px;padding:18px;color:#fff;margin-bottom:14px;
    background:linear-gradient(135deg,#a06bff,#ff5fa0);box-shadow:5px 6px 0 var(--ink);}
  #hero .ht{font-family:var(--bub);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.95;}
  #hero .hl{font-family:var(--bub);font-size:22px;font-weight:800;margin:5px 0 4px;line-height:1.2;text-shadow:0 2px 0 rgba(0,0,0,.12);}
  #hero .hs{font-size:14.5px;font-weight:500;opacity:.96;line-height:1.4;margin-bottom:15px;}
  #hero .hp{width:100%;background:#fff;color:#7a3fe0;border:3px solid var(--ink);border-radius:18px;padding:14px;
    font-family:var(--bub);font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--ink);transition:.08s;}
  #hero .hp:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  #hero .chips{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}
  #hero .chip{background:#ffffff;color:var(--ink);border:2.5px solid var(--ink);border-radius:14px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 var(--ink);transition:.08s;}
  #hero .chip:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}
  /* panels — candy, outlined, sticker shadow */
  .panel{border:3px solid var(--ink);border-radius:24px;padding:15px 15px 12px;margin-bottom:14px;box-shadow:var(--sh);}
  #nowCard{background:#ffe79a;}
  .c-today{background:#bfe6ff;} .c-habit{background:#ffd0e6;} .c-tom{background:#ddd0ff;}
  #nowCard .nl{font-family:var(--bub);font-size:16px;font-weight:800;margin-bottom:2px;}
  #nowCard .ns{font-size:13px;color:#7a5a2a;font-weight:500;margin-bottom:11px;}
  #nowBtn{width:100%;background:#fff;color:#c47a00;border:3px solid var(--ink);border-radius:16px;padding:13px;font-family:var(--bub);font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--ink);transition:.08s;}
  #nowBtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  .cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .cardhead h3{font-family:var(--bub);font-size:18px;font-weight:800;}
  .meta{font-family:var(--bub);font-size:13px;color:var(--ink);font-weight:700;background:rgba(255,255,255,.6);padding:3px 10px;border-radius:11px;border:2px solid var(--ink);}
  .add{background:#fff;color:var(--ink);border:2.5px solid var(--ink);border-radius:13px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--bub);box-shadow:0 3px 0 var(--ink);transition:.08s;}
  .add:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}
  .empty{color:#6a567e;font-size:14px;padding:9px 2px;font-weight:600;}
  .blk{display:flex;align-items:center;gap:10px;padding:10px 6px;background:rgba(255,255,255,.55);border:2.5px solid var(--ink);border-radius:15px;margin-bottom:8px;}
  .blk .tm{font-family:var(--bub);font-size:12px;font-weight:800;color:var(--ink);width:96px;flex:none;}
  .blk .ti{flex:1;font-size:15px;font-weight:600;}
  .blk.done .ti{opacity:.55;text-decoration:line-through;}
  .ck{width:28px;height:28px;border-radius:9px;border:2.5px solid var(--ink);background:#fff;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;}
  .ck.on{background:var(--ok);}
  .del{color:var(--ink);opacity:.5;font-size:15px;cursor:pointer;padding:4px;font-weight:700;}
  .divlab{font-family:var(--bub);font-size:12px;color:var(--ink);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:14px 2px 8px;display:flex;justify-content:space-between;}
  .logi{display:flex;align-items:center;gap:10px;padding:9px 6px;background:rgba(255,255,255,.45);border:2.5px solid var(--ink);border-radius:14px;margin-bottom:7px;}
  .logi .lt{font-family:var(--bub);font-size:12px;color:var(--ink);font-weight:700;width:62px;flex:none;}
  .logi .ln{flex:1;font-size:14.5px;font-weight:600;}
  .logi .lm{font-family:var(--bub);font-size:13px;font-weight:800;color:#fff;background:var(--pink);padding:3px 10px;border-radius:11px;border:2px solid var(--ink);}
  .hab{display:flex;align-items:center;gap:11px;padding:9px 6px;background:rgba(255,255,255,.55);border:2.5px solid var(--ink);border-radius:15px;margin-bottom:8px;cursor:pointer;}
  .hab .he{font-size:23px;width:30px;text-align:center;flex:none;}
  .hab .hn{flex:1;font-size:15px;font-weight:700;}
  .hab.done .hn{opacity:.5;}
  .add2{width:100%;background:#fff;border:3px solid var(--ink);color:var(--ink);border-radius:15px;padding:11px;font-family:var(--bub);font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 0 var(--ink);transition:.08s;}
  .add2:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  /* sheet (menu) */
  #sheet{position:fixed;inset:0;background:rgba(40,20,60,.45);display:flex;align-items:flex-end;z-index:30;opacity:0;pointer-events:none;transition:.22s;}
  #sheet.on{opacity:1;pointer-events:auto;}
  .scard{width:100%;max-width:520px;margin:0 auto;background:#fff3fb;border:3px solid var(--ink);border-bottom:none;border-radius:30px 30px 0 0;padding:14px 18px max(28px,calc(env(safe-area-inset-bottom) + 16px));transform:translateY(28px);transition:transform .26s cubic-bezier(.2,.9,.3,1.3);max-height:88vh;overflow:auto;}
  #sheet.on .scard{transform:translateY(0);}
  .shandle{width:48px;height:5px;border-radius:3px;background:var(--ink);opacity:.3;margin:0 auto 14px;}
  .sttl{font-family:var(--bub);font-size:20px;font-weight:800;margin-bottom:14px;}
  .frm{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .frm input[type=text]{flex:1;min-width:120px;}
  input[type=text],input[type=time]{background:#fff;border:2.5px solid var(--ink);border-radius:14px;padding:12px;font-size:15px;font-family:inherit;font-weight:600;color:var(--ink);}
  input[type=time]{width:104px;}
  .go{background:var(--purple);color:#fff;border:2.5px solid var(--ink);border-radius:14px;padding:0 17px;font-size:22px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--ink);}
  .go:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  .done2{width:100%;background:var(--pink);color:#fff;border:3px solid var(--ink);border-radius:18px;padding:15px;font-family:var(--bub);font-size:17px;font-weight:800;cursor:pointer;margin-top:10px;box-shadow:0 5px 0 var(--ink);transition:.08s;}
  .done2:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  .done2:disabled{opacity:.45;box-shadow:none;}
  .pchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .pchip{background:#fff;border:2.5px solid var(--ink);border-radius:14px;padding:9px 13px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);box-shadow:0 3px 0 var(--ink);transition:.08s;}
  .pchip:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}
  .pchip.on{background:var(--purple);color:#fff;}
  .lbl{font-family:var(--bub);font-size:13px;color:var(--ink);font-weight:700;margin:4px 2px 8px;}
  .subi{display:flex;align-items:center;gap:12px;padding:11px 6px;background:#fff;border:2.5px solid var(--ink);border-radius:14px;margin-bottom:8px;font-size:15px;font-weight:600;cursor:pointer;}
  .c-stats{background:#ffd9a8;}
  .statrow{display:flex;align-items:center;gap:10px;padding:7px 2px;}
  .statrow .se{font-size:21px;width:26px;text-align:center;flex:none;}
  .statrow .sn{font-family:var(--bub);font-weight:800;font-size:14px;width:72px;flex:none;}
  .statrow .sb{flex:1;}
  .bar{height:14px;border:2.5px solid var(--ink);border-radius:9px;background:#fff;overflow:hidden;}
  .bar i{display:block;height:100%;}
  .statrow .sl{font-family:var(--bub);font-weight:800;font-size:12.5px;flex:none;}
  .pull{display:flex;align-items:center;gap:9px;padding:7px 2px;font-weight:600;font-size:14px;}
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .bigcat{border:3px solid var(--ink);border-radius:18px;padding:16px 10px;text-align:center;color:#fff;cursor:pointer;box-shadow:0 5px 0 var(--ink);transition:.08s;}
  .bigcat:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
  .bce{font-size:30px;line-height:1;} .bcl{font-family:var(--bub);font-weight:800;font-size:15px;margin-top:6px;}
  .subcat{border:2.5px solid var(--ink);background:#fff;border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:0 4px 0 var(--ink);transition:.08s;}
  .subcat:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  .scl{font-family:var(--bub);font-weight:800;font-size:13px;margin-top:5px;color:var(--ink);}
  .tilegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
  .gtile{border:2.5px solid var(--ink);background:#fff;border-radius:15px;padding:11px 4px;text-align:center;cursor:pointer;box-shadow:0 3px 0 var(--ink);color:var(--ink);transition:.08s;}
  .gtile:active{transform:translateY(3px);box-shadow:0 0 0 var(--ink);}
  .gtile.on{color:#fff;}
  .ge{font-size:25px;line-height:1.1;} .gl{font-size:11px;font-weight:700;margin-top:3px;line-height:1.1;}
  .rate{display:flex;align-items:center;gap:10px;padding:9px 2px;}
  .rate .re{font-size:21px;width:26px;text-align:center;flex:none;} .rate .rn{font-family:var(--bub);font-weight:800;font-size:13px;width:64px;flex:none;}
  .rate input[type=range]{flex:1;accent-color:var(--purple);} .rate .rv{font-family:var(--bub);font-weight:800;width:26px;text-align:right;color:var(--purple);flex:none;}
  .pfline{font-family:var(--bub);font-weight:700;font-size:12.5px;color:var(--ink);background:rgba(255,255,255,.55);border:2px solid var(--ink);border-radius:12px;padding:8px 10px;margin-bottom:10px;}
  #avatarWrap{text-align:center;margin:2px 0 10px;}
  #avatar{image-rendering:pixelated;filter:drop-shadow(2px 3px 0 rgba(58,37,64,.25));}
  .subline{display:flex;flex-wrap:wrap;gap:6px;margin:0 2px 10px 36px;}
  .subpill{font-size:11px;font-weight:700;color:var(--ink);background:rgba(255,255,255,.7);border:2px solid var(--ink);border-radius:9px;padding:2px 7px;}
  .qline{font-weight:700;font-size:14px;margin:12px 2px 7px;color:var(--ink);}
  .facerow{display:flex;gap:8px;margin-bottom:4px;}
  .face{flex:1;text-align:center;font-size:22px;padding:9px 0;border:2.5px solid #e3dcf2;border-radius:13px;background:#fff;cursor:pointer;box-shadow:0 3px 0 rgba(58,37,64,.18);}
  .face.on{border:3px solid var(--ink);box-shadow:0 1px 0 var(--ink);transform:translateY(2px);}
  .obarT{height:8px;background:rgba(58,37,64,.12);border-radius:5px;overflow:hidden;margin-bottom:12px;}
  .obarT i{display:block;height:100%;background:var(--purple);transition:width .3s;}
  .tab{display:none;} .tab.on{display:block;}
  #screen{padding-bottom:98px;}
  #nav{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;justify-content:space-around;align-items:flex-end;
    background:#fff3fb;border-top:3px solid var(--ink);padding:8px 10px max(10px,env(safe-area-inset-bottom));box-shadow:0 -5px 18px rgba(120,80,180,.16);}
  .nb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--soft);font-family:var(--bub);font-weight:800;padding:0;}
  .nb .ne{font-size:22px;line-height:1;} .nb .nl2{font-size:10px;}
  .nb.on{color:var(--ink);}
  .nb.center{background:linear-gradient(180deg,#ffb0db,#ff4f9f);border:3px solid var(--ink);border-radius:50%;width:58px;height:58px;justify-content:center;box-shadow:0 5px 0 var(--ink);transform:translateY(-12px);}
  .nb.center .ne{font-size:26px;}
  .nb.center:active{transform:translateY(-8px);box-shadow:0 1px 0 var(--ink);}
  .htag{font-size:10px;font-weight:800;font-family:var(--bub);color:#fff;border-radius:8px;padding:2px 7px;}
  .wkdots{display:flex;gap:3px;margin-right:6px;}
  .wkdots i{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--ink);}
  .qopt{display:block;width:100%;text-align:left;padding:12px 14px;border:2.5px solid #e3dcf2;border-radius:14px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px;box-shadow:0 3px 0 rgba(58,37,64,.12);}
  .qopt.on{box-shadow:0 1px 0 var(--ink);transform:translateY(2px);}
  /* ===== NIGHT MODE ===== */
  :root{ --ink:#f3edfc; --soft:#b2a6d8; --line:#433a5e; --accent:#c39bf0; --card:#2a2244; }
  html,body{background:linear-gradient(165deg,#1b1535 0%,#221a3e 50%,#2c1e46 100%);color:#f3edfc;touch-action:manipulation;-webkit-text-size-adjust:100%;}
  #tree{display:block;margin:2px auto 6px;}
  #date{color:#a99ad6;} #hello{text-shadow:none;}
  .pill{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#ece4f7;}
  #nowCard{background:#362b1c;}
  .c-today{background:#202c4e;} .c-habit{background:#36203f;} .c-tom{background:#2a2150;} .c-stats{background:#2f2552;}
  .panel{box-shadow:0 8px 22px rgba(0,0,0,.5);}
  .meta{background:rgba(255,255,255,.08);color:#ece4f7;}
  .add{background:rgba(255,255,255,.08);color:#ece4f7;box-shadow:0 3px 0 #100c1c;}
  .add2{background:rgba(255,255,255,.06);color:#cfc4ec;box-shadow:0 4px 0 #100c1c;}
  .empty{color:#9b8fc0;} .divlab{color:#bcb0e0;} .lbl{color:#a99ad6;} .qline{color:#ece4f7;}
  .blk,.hab,.logi{background:rgba(255,255,255,.05);}
  .ck{background:#161020;}
  #nav{background:#171130;border-top-color:#4a4068;}
  .nb{color:#7d72a0;} .nb.on{color:#ece4f7;}
  .sheetcard{background:#221b36;} .shandle{background:#4a4068;}
  input[type=text],input[type=time],input[type=number]{background:#161020;color:#ece4f7;}
  .tile,.gtile,.subcat,.qopt,.face,.pchip,.subitem,.subi{background:#251d40;color:#f3edfc;box-shadow:0 3px 0 #120d22;}
  input[type=text],input[type=time],input[type=number],.ck,.bar{background:#1d1636;}
  .subpill{background:rgba(255,255,255,.07);}
  .pfline{background:rgba(255,255,255,.06);color:#ece4f7;}
  .bar{background:#161020;}
  .obarT{background:rgba(255,255,255,.1);}
  #hero .chip{background:rgba(255,255,255,.12);color:#fff;box-shadow:0 3px 0 #100c1c;}
  #hero .hp,#nowBtn,.done2,.go{box-shadow:0 5px 0 #100c1c, inset 0 2px 0 rgba(255,255,255,.25);}
  .bigcat,.nb.center{box-shadow:0 5px 0 #100c1c;}
  /* nav comfort */
  #nav{padding:9px 8px max(14px,calc(env(safe-area-inset-bottom) + 2px));gap:2px;align-items:center;}
  .nb{flex:1;padding:8px 2px 6px;border-radius:16px;gap:4px;}
  .nb .ne{font-size:26px;line-height:1;}
  .nb .nl2{font-size:11px;font-weight:700;}
  .nb.on{color:#fff;background:rgba(180,142,224,.16);}
  .nb.center{flex:none;width:62px;height:62px;}
  .nb.center .ne{font-size:30px;}
  .nb.center.on{background:linear-gradient(180deg,#ffb0db,#ff4f9f);}
  /* calendar day view */
  .cal{position:relative;margin:8px 0 4px;}
  .calhour{position:absolute;left:0;right:0;height:0;border-top:1px solid rgba(255,255,255,.09);}
  .calhour span{position:absolute;left:0;top:-8px;font-size:11px;font-weight:700;color:var(--soft);width:38px;}
  .calblk{position:absolute;left:48px;right:3px;border-radius:16px;padding:6px 12px;overflow:hidden;cursor:grab;touch-action:none;border:2.5px solid #160510;transition:transform .16s cubic-bezier(.2,.85,.3,1.3),box-shadow .14s,top .22s cubic-bezier(.2,.8,.25,1),height .16s,opacity .15s;}
  .calblk .cn,.calblk .ct{color:#fff2f9;}
  .calblk:active{transform:scale(.98);}
  .calblk.lift{transform:scale(1.05);box-shadow:0 16px 34px rgba(0,0,0,.62);z-index:6;opacity:.97;cursor:grabbing;}
  .calblk.pin{border-style:solid;border-color:rgba(255,210,74,.65)!important;border-left-color:#ffd24a!important;}
  .calblk.dragging{transition:transform .14s,box-shadow .14s;}
  .calx{position:absolute;top:3px;right:4px;width:21px;height:21px;border-radius:7px;background:rgba(10,6,20,.42);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;opacity:.7;}
  .calblk .grip,.calblk .gript{position:absolute;left:0;right:0;height:12px;display:flex;justify-content:center;cursor:ns-resize;touch-action:none;}
  .calblk .grip{bottom:0;align-items:flex-end;padding-bottom:2px;} .calblk .gript{top:0;align-items:flex-start;padding-top:2px;}
  .calblk .grip::after,.calblk .gript::after{content:"";width:20px;height:3px;border-radius:2px;background:rgba(255,255,255,.4);}
  .calhint{text-align:center;font-size:11px;color:var(--soft);font-weight:600;margin:0 0 4px;line-height:1.35;}
  .lanehead{display:flex;font-family:var(--bub);font-weight:800;font-size:10px;letter-spacing:1.5px;color:var(--soft);margin:0 0 4px;padding-left:42px;}
  .lanehead .lhx{flex:1;text-align:center;}
  .lanediv{position:absolute;left:50%;top:0;bottom:0;border-left:1px dashed rgba(255,255,255,.14);}
  /* PLAN celebration (done) · ghost (missed) · REAL gold (on-plan) / coral (drift) · half-hour ticks — DESIGN-BRIEF §14/§23/§24 */
  @keyframes celePop{0%{transform:scale(.62);}60%{transform:scale(1.05);}100%{transform:scale(1);}}
  @keyframes foilSlide{0%{background-position:-40% 0;}100%{background-position:140% 0;}}
  @keyframes spkTwinkle{0%,100%{transform:scale(.8);opacity:.6;}50%{transform:scale(1.15);opacity:1;}}
