<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ALTER</title>
<meta name="theme-color" content="#ffd9ee" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ALTER" />
<link rel="manifest" href="manifest.json" />
<style>
  :root{
    --pink:#ff8fc7; --pinkD:#ff5fa8; --blue:#6fd0f0; --green:#8fe39b; --yellow:#ffe07a;
    --purple:#c79bf0; --cream:#fff5fb; --ink:#4a3a63; --inkSoft:#8a7ba0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:linear-gradient(180deg,#aee9ff 0%,#d8c9ff 55%,#ffd9ee 100%);
    color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-weight:700;}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #stage{display:block;image-rendering:pixelated;}
  /* chrome */
  #hud{position:fixed;top:max(14px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;padding:0 16px;pointer-events:none;}
  .pill{background:rgba(255,255,255,.78);border:2px solid #fff;border-radius:18px;
    padding:8px 13px;font-size:12px;color:var(--ink);box-shadow:0 3px 10px rgba(150,120,200,.18);}
  #greet{text-transform:lowercase;}
  #lume{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--inkSoft);}
  #lume .dot{width:11px;height:11px;border-radius:50%;background:var(--yellow);
    box-shadow:0 0 8px var(--yellow);transition:.6s;}
  #mirror{position:fixed;left:0;right:0;bottom:118px;padding:0 22px;text-align:center;display:flex;justify-content:center;}
  #mirror span{background:rgba(255,255,255,.82);border-radius:16px;padding:10px 16px;font-size:13px;
    line-height:1.5;color:var(--ink);max-width:360px;box-shadow:0 4px 14px rgba(150,120,200,.16);}
  #moveBtn{position:fixed;left:50%;transform:translateX(-50%);
    bottom:max(34px,calc(env(safe-area-inset-bottom) + 22px));
    background:linear-gradient(180deg,#ff9ecd,#ff5fa8);color:#fff;border:3px solid #fff;
    border-radius:26px;padding:16px 34px;font-size:15px;font-weight:800;cursor:pointer;
    box-shadow:0 8px 22px rgba(255,95,168,.40);letter-spacing:.3px;
    animation:pop 2.6s ease-in-out infinite;}
  @keyframes pop{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.045);}}
  #moveBtn:active{transform:translateX(-50%) scale(.96);}
  #bloom{position:fixed;inset:0;pointer-events:none;opacity:0;mix-blend-mode:screen;}
  /* sheet */
  #sheet{position:fixed;inset:0;background:rgba(90,70,130,.35);backdrop-filter:blur(3px);
    display:flex;align-items:flex-end;z-index:10;opacity:0;pointer-events:none;transition:opacity .25s;}
  #sheet.on{opacity:1;pointer-events:auto;}
  .sheetcard{width:100%;max-width:520px;margin:0 auto;background:var(--cream);
    border-radius:26px 26px 0 0;border:3px solid #fff;border-bottom:none;
    padding:14px 16px max(26px,calc(env(safe-area-inset-bottom) + 16px));transform:translateY(20px);transition:transform .25s;}
  #sheet.on .sheetcard{transform:translateY(0);}
  .handle{width:42px;height:5px;border-radius:3px;background:#ffd0e6;margin:2px auto 14px;}
  .sheetT{font-size:13px;color:var(--inkSoft);margin-bottom:12px;text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .tile{background:#fff;border:2.5px solid #ffe0ef;border-radius:20px;padding:13px 4px;text-align:center;
    cursor:pointer;color:var(--ink);font-size:12px;font-weight:700;transition:transform .1s,background .1s,border-color .1s;}
  .tile .em{font-size:26px;display:block;margin-bottom:5px;line-height:1;}
  .tile:active{transform:scale(.93);}
  .tile.on{background:#fff0f7;border-color:var(--pink);box-shadow:0 5px 16px rgba(255,143,199,.32);}
  .tile.send{grid-column:1/4;background:linear-gradient(120deg,#fff0c2,#ffd9ec);border-color:var(--yellow);}
  .tile.send .em{color:#f0a93a;}
  .subitem{display:flex;align-items:center;gap:13px;padding:14px 8px;border-top:2px solid #ffe6f2;font-size:15px;cursor:pointer;color:var(--ink);}
  .subitem:first-child{border-top:none;}
  .box{width:26px;height:26px;border-radius:9px;border:2.5px solid #ffc7e3;background:#fff;flex:none;}
  .subitem.done .box{background:var(--green);border-color:var(--green);}
  .subitem.done span{color:var(--inkSoft);text-decoration:line-through;}
  .back{margin-top:14px;width:100%;background:none;border:none;color:var(--inkSoft);font-size:14px;font-weight:700;cursor:pointer;padding:10px;}
  /* onboarding — full bright screen */
  #ob{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;justify-content:center;
    background:linear-gradient(180deg,#aee9ff,#ffd9ee);padding:26px 20px max(30px,calc(env(safe-area-inset-bottom) + 20px));overflow:auto;}
  #ob.on{display:flex;}
  #obLine{text-align:center;font-size:20px;font-weight:800;color:var(--ink);margin-bottom:20px;line-height:1.4;}
  #obLine small{display:block;font-size:13px;font-weight:700;color:var(--inkSoft);margin-top:8px;}
  .obBtn{width:100%;max-width:420px;margin:16px auto 0;display:block;background:linear-gradient(180deg,#ff9ecd,#ff5fa8);
    color:#fff;border:3px solid #fff;border-radius:24px;padding:17px;font-size:16px;font-weight:800;cursor:pointer;
    box-shadow:0 8px 22px rgba(255,95,168,.40);}
  .obBtn:disabled{opacity:.5;}
  #obGrid{max-width:420px;margin:0 auto;width:100%;}
</style>
</head>
<body>
  <div id="app"><canvas id="stage"></canvas></div>

  <div id="hud">
    <div id="greet" class="pill"></div>
    <div id="lume" class="pill">today <span class="dot"></span></div>
  </div>
  <div id="mirror"><span></span></div>
  <button id="moveBtn"></button>
  <div id="bloom"></div>

  <div id="sheet"><div class="sheetcard">
    <div class="handle"></div>
    <p class="sheetT" id="sheetT"></p>
    <div id="sheetBody"></div>
    <button class="back" id="sheetClose">close</button>
  </div></div>

  <div id="ob">
    <div id="obLine"></div>
    <div id="obCtl"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
