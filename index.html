<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ALTER</title>
<meta name="theme-color" content="#c4a8ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ALTER" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{ --pink:#ff5fa8; --blue:#3a9ae6; --green:#1fb877; --yellow:#ffd23a; --purple:#9a4fe0;
    --ink:#4a3a63; --inkSoft:#8a7ba0; --bub:"Baloo 2",system-ui,sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;color:var(--ink);
    font-family:"Fredoka",system-ui,-apple-system,sans-serif;font-weight:500;
    background:linear-gradient(180deg,#8fd9ff 0%,#c9b3ff 52%,#ffbfe0 100%);}
  /* floating decorative depth */
  #bg{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
  #bg i{position:absolute;border-radius:50%;filter:blur(26px);opacity:.5;animation:float 11s ease-in-out infinite;}
  #bg i:nth-child(1){width:200px;height:200px;background:#ff9ed1;left:-40px;top:8%;}
  #bg i:nth-child(2){width:170px;height:170px;background:#86e3ff;right:-30px;top:30%;animation-delay:-3s;}
  #bg i:nth-child(3){width:190px;height:190px;background:#b69bff;left:10%;bottom:-30px;animation-delay:-6s;}
  #bg i:nth-child(4){width:120px;height:120px;background:#fff19a;right:14%;bottom:18%;animation-delay:-2s;}
  @keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-22px) scale(1.06);}}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;}
  #stage{display:block;image-rendering:pixelated;border-radius:18px;
    box-shadow:0 18px 50px rgba(90,50,140,.30), 0 0 0 4px rgba(255,255,255,.45);}
  /* chrome */
  #hud{position:fixed;top:max(14px,env(safe-area-inset-top));left:0;right:0;z-index:3;
    display:flex;justify-content:space-between;align-items:center;padding:0 16px;pointer-events:none;}
  .pill{background:rgba(255,255,255,.82);border:2px solid rgba(255,255,255,.9);border-radius:22px;
    padding:9px 15px;font-size:13px;font-weight:600;color:var(--ink);
    box-shadow:0 6px 16px rgba(120,80,180,.18);backdrop-filter:blur(8px);}
  #greet{text-transform:lowercase;font-family:var(--bub);font-weight:700;}
  #lume{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--inkSoft);}
  #lume .dot{width:12px;height:12px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);transition:.6s;}
  #mirror{position:fixed;left:0;right:0;bottom:120px;padding:0 22px;display:flex;justify-content:center;z-index:3;}
  #mirror span{background:rgba(255,255,255,.88);border:2px solid rgba(255,255,255,.9);border-radius:20px;
    padding:12px 18px;font-size:15px;font-weight:500;line-height:1.45;color:var(--ink);max-width:360px;
    box-shadow:0 8px 22px rgba(120,80,180,.18);backdrop-filter:blur(8px);}
  #moveBtn{position:fixed;left:50%;transform:translateX(-50%);z-index:3;
    bottom:max(34px,calc(env(safe-area-inset-bottom) + 22px));
    background:linear-gradient(180deg,#ffb0db,#ff4f9f);color:#fff;border:3px solid #fff;
    border-radius:30px;padding:17px 40px;font-size:18px;font-family:var(--bub);font-weight:800;cursor:pointer;
    box-shadow:0 12px 28px rgba(255,79,159,.45), inset 0 2px 0 rgba(255,255,255,.5);
    letter-spacing:.3px;animation:pop 2.6s ease-in-out infinite;}
  @keyframes pop{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.05);}}
  #moveBtn:active{transform:translateX(-50%) scale(.95);}
  #bloom{position:fixed;inset:0;pointer-events:none;opacity:0;mix-blend-mode:screen;z-index:2;}
  /* sheet */
  #sheet{position:fixed;inset:0;background:rgba(70,50,110,.4);backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;z-index:10;opacity:0;pointer-events:none;transition:opacity .25s;}
  #sheet.on{opacity:1;pointer-events:auto;}
  .sheetcard{width:100%;max-width:520px;margin:0 auto;background:linear-gradient(180deg,#fffafd,#fff0f8);
    border-radius:30px 30px 0 0;border:3px solid #fff;border-bottom:none;
    padding:14px 16px max(26px,calc(env(safe-area-inset-bottom) + 16px));transform:translateY(20px);transition:transform .28s cubic-bezier(.2,.9,.3,1.3);
    box-shadow:0 -10px 40px rgba(120,80,180,.25);}
  #sheet.on .sheetcard{transform:translateY(0);}
  .handle{width:46px;height:5px;border-radius:3px;background:#ffd0e6;margin:2px auto 14px;}
  .sheetT{font-size:15px;color:var(--inkSoft);margin-bottom:10px;text-align:center;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
  .tile{background:#fff;border:2.5px solid #ffe0ef;border-radius:22px;padding:14px 4px;text-align:center;
    cursor:pointer;color:var(--ink);font-size:13px;font-weight:600;transition:transform .1s;
    box-shadow:0 5px 14px rgba(120,80,180,.10);}
  .tile .em{font-size:28px;display:block;margin-bottom:5px;line-height:1;}
  .tile:active{transform:scale(.92);}
  .tile.send{grid-column:1/4;background:linear-gradient(120deg,#fff0bf,#ffd9ec);border-color:var(--yellow);}
  .subitem{display:flex;align-items:center;gap:13px;padding:15px 8px;border-top:2px solid #ffe6f2;font-size:16px;cursor:pointer;color:var(--ink);font-weight:500;}
  .subitem:first-child{border-top:none;}
  .box{width:28px;height:28px;border-radius:10px;border:3px solid #ffc7e3;background:#fff;flex:none;}
  .subitem.done .box{background:var(--green);border-color:var(--green);}
  .subitem.done span{color:var(--inkSoft);text-decoration:line-through;}
  .back{margin-top:14px;width:100%;background:none;border:none;color:var(--inkSoft);font-size:15px;font-weight:600;cursor:pointer;padding:10px;font-family:inherit;}
  /* onboarding */
  #ob{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;justify-content:center;
    padding:30px 22px max(30px,calc(env(safe-area-inset-bottom) + 20px));overflow:auto;}
  #ob.on{display:flex;}
  #obBar{position:fixed;top:0;left:0;right:0;height:6px;background:rgba(255,255,255,.4);z-index:21;}
  #obBar i{display:block;height:100%;width:0;background:#fff;border-radius:0 4px 4px 0;transition:width .35s ease;box-shadow:0 0 8px rgba(255,255,255,.8);}
  #obLine{text-align:center;font-family:var(--bub);font-size:25px;font-weight:800;color:#fff;margin-bottom:22px;line-height:1.25;
    text-shadow:0 3px 12px rgba(80,40,120,.28);}
  #obLine small{display:block;font-family:"Fredoka";font-size:14px;font-weight:500;color:rgba(255,255,255,.92);margin-top:10px;text-shadow:0 1px 4px rgba(80,40,120,.25);}
  .obBtn{width:100%;max-width:440px;margin:18px auto 0;display:block;color:#fff;border:3px solid rgba(255,255,255,.9);
    border-radius:26px;padding:18px;font-size:18px;font-family:var(--bub);font-weight:800;cursor:pointer;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.4);transition:transform .1s;}
  .obBtn:active{transform:scale(.96);}
  #obCtl{position:relative;z-index:1;}
</style>
</head>
<body>
  <div id="bg"><i></i><i></i><i></i><i></i></div>
  <div id="app"><canvas id="stage"></canvas></div>

  <div id="hud">
    <div id="greet" class="pill"></div>
    <div id="lume" class="pill">today <span class="dot"></span></div>
  </div>
  <div id="mirror"><span></span></div>
  <button id="moveBtn"></button>
  <div id="bloom"></div>

  <div id="sheet"><div class="sheetcard">
    <div class="handle"></div>
    <p class="sheetT" id="sheetT"></p>
    <div id="sheetBody"></div>
    <button class="back" id="sheetClose">close</button>
  </div></div>

  <div id="ob">
    <div id="obBar"><i></i></div>
    <div id="obLine"></div>
    <div id="obCtl"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
